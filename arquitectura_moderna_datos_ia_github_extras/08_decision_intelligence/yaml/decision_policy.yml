decision_policy:
  name: shipment_delay_prioritization
  version: 1.0.0
  thresholds:
    critical_delay_risk: 0.85
    high_delay_risk: 0.75
    review_delay_risk: 0.65
    sustainability_review: 0.80
  actions:
    ESCALATE_CRITICAL:
      requires_human_approval: true
      notify_roles: [operations_manager, customer_service_lead]
    ESCALATE_HIGH:
      requires_human_approval: true
      notify_roles: [operations_lead]
    REVIEW_BY_OPERATOR:
      requires_human_approval: false
    MONITOR:
      requires_human_approval: false
