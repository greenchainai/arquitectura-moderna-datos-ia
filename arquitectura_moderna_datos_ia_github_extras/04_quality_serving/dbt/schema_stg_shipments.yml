version: 2

models:
  - name: stg_shipments
    description: "Envíos normalizados desde la capa raw."
    columns:
      - name: shipment_id
        tests: [not_null, unique]
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: shipment_status
        tests:
          - not_null
          - accepted_values:
              values: [CREATED, IN_TRANSIT, DELIVERED, DELAYED, CANCELLED]
