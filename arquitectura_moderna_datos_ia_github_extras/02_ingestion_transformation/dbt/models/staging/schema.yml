version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: tracking_events

models:
  - name: stg_tracking_events
    description: "Eventos de tracking normalizados desde la capa raw."
    columns:
      - name: tracking_event_id
        tests: [not_null, unique]
      - name: shipment_id
        tests: [not_null]
      - name: event_timestamp
        tests: [not_null]
