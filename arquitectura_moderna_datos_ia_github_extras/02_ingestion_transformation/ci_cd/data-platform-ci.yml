name: data-platform-ci

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Validate data contracts
        run: python scripts/validate_contracts.py
      - name: Run dbt tests
        run: |
          cd dbt
          dbt deps
          dbt build --select staging+
